name: Publish packages

# Publishes @tjakoen/{grain,mill,proof,crumb} to GitHub Packages when their version changes.
# Bump a package's version in its package.json and push to main: this publishes the new
# version and skips any version already on the registry (so ordinary commits are a no-op).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@tjakoen'
      - name: Publish new package versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for p in grain mill proof crumb; do
            v=$(node -p "require('./packages/$p/package.json').version")
            if npm view "@tjakoen/$p@$v" version >/dev/null 2>&1; then
              echo "@tjakoen/$p@$v already published — skipping"
            else
              # Substitute workspace:* deps -> the concrete sibling versions BEFORE publishing.
              # `npm publish -w` in this runner does not reliably rewrite the workspace: protocol
              # (crumb@0.1.0 shipped with literal "workspace:*" and was uninstallable), so do it
              # explicitly — the checkout is ephemeral, so mutating the manifest here is safe.
              node -e '
                const fs = require("fs");
                const ver = (n) => require(`./packages/${n}/package.json`).version;
                const map = { "@tjakoen/grain": ver("grain"), "@tjakoen/mill": ver("mill"), "@tjakoen/proof": ver("proof") };
                const f = `packages/${process.argv[1]}/package.json`;
                const j = JSON.parse(fs.readFileSync(f));
                for (const k of ["dependencies", "devDependencies"])
                  for (const d in (j[k] || {}))
                    if (String(j[k][d]).startsWith("workspace:") && map[d]) j[k][d] = map[d];
                fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
              ' "$p"
              echo "Publishing @tjakoen/$p@$v"
              npm publish -w "@tjakoen/$p"
            fi
          done
