<!-- atoms/b-button — ONE class (.btn). Polymorphic: `as="a"` for links, else <button>.
     label → text (prop-text); variant/size/status/href/type → attributes (config props). -->
<slot-tag prop-as="button" class="btn" prop-text="label"
          prop-attr-type="type" prop-attr-href="href"
          prop-attr-data-variant="variant" prop-attr-data-size="size" prop-attr-data-status="status">Button</slot-tag>
