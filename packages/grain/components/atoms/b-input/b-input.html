<!-- atoms/b-input — labelled text field. Config props: name, type, placeholder,
     required (bare boolean), variant, size. Usable self-closed. -->
<label class="field" prop-attr-data-variant="variant" prop-attr-data-size="size">
  <span class="field__label" prop-text="label">Label</span>
  <input class="field__input"
         prop-attr-name="name" prop-attr-type="type"
         prop-attr-placeholder="placeholder" prop-attr-required="required">
</label>
