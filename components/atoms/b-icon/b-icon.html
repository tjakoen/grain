<!-- atoms/b-icon — one inline SVG glyph from the shared sprite (grain/assets/sprite.svg).
     `sym` is the whole sprite reference (e.g. /assets/sprite.svg#loop) — the render binding
     vocabulary can't concatenate, so the ref is passed whole. `size` scales it (sm/lg).
     Decorative by default (aria-hidden); label the CONTROL that wraps it, not the glyph. -->
<svg class="icon" prop-attr-data-size="size" aria-hidden="true" focusable="false"><use prop-attr-href="sym"></use></svg>
